name: support-desk-env
version: "1.0.0"
description: "Customer support ticket triage and resolution environment"
author: "your-hf-username"
tags: [customer-support, nlp, real-world, triage]
tasks:
  - name: task1_classify
    difficulty: easy
    max_steps: 1
    reward_range: [0.0, 1.0]
  - name: task2_respond
    difficulty: medium
    max_steps: 3
    reward_range: [0.0, 1.0]
  - name: task3_resolve
    difficulty: hard
    max_steps: 5
    reward_range: [0.0, 1.0]
endpoints:
  reset: /reset
  step: /step
  state: /state
